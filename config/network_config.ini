# ---------------------------------------------------------------------------
# CMS_Proxy - configurazione di rete
# ---------------------------------------------------------------------------
# Formato INI: sezioni [nome], coppie key = value
# Commenti con # o ;
# Array di oggetti con sezioni numerate (es. [acs.destination.1])
# ---------------------------------------------------------------------------

[cms]
multicast_group = 226.1.1.30
multicast_port  = 55000

# --- ACS ---

[acs]
multicast_group = 225.0.0.25
multicast_port  = 2525

[acs.multicast_tx]
group = 225.0.0.25
port  = 2525

[acs.tcp_unicast]
listen_ip   = 127.0.0.1
listen_port = 56101

[acs.destination.1]
name = PORT
lrad = LRAD1
id   = 1
ip   = 127.0.0.1
port = 9000

[acs.destination.2]
name = STARBOARD
lrad = LRAD2
id   = 2
ip   = 127.0.0.1
port = 9000

# --- NAVS ---

[navs]
multicast_group = 239.192.44.173
multicast_port  = 55437

